version: '3.1'
services:
  metadata_gen:
    build:
      .
    ports:
      - '80:5000'
    env_file:
      - '.env'
    container_name:
      metadata_gen
  logging_suggestion_db:
    image: postgres:17.9
    ports:
      - '5432:5432'
    env_file:
      - '.env'
    volumes:
      - ./db-data/:/var/lib/postgresql/data/
    container_name:
      suggestion_logging